<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Boutique fermée</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
      background: #f4f4f4;
    }
    .box {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      margin-bottom: 20px;
    }
    #retourbutton {
      background-color: black;
      color: red;
      padding: 15px 30px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    #retourbutton:hover {
      background-color: red;
      color: white;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>🚧 Boutique temporairement fermée 🚧</h1>
    <p>Je serais bientôt de retour !</p>
    <p>Amicalement LDcarpe !</p>
  </div>

  <button id="retourbutton">RETOUR</button>

  <script>
    document.getElementById("retourbutton").addEventListener("click", function() {
      window.location.href = "index.html"; // change "index.html" par la page où tu veux renvoyer
    });
  </script>
</body>
</html>
