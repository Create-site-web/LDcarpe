<body>

<nav>
  <ul>
    <li><a href="index.html">Accueil</a></li>

  </ul>

<h2>🚨 AUTOCOLLANTS OFFICIELS LD CARP 🚨</h2>
<p>Disponibles sur commande</p>

<div class="products">

  <div class="product">
    <img src="collant/10 x 10.png" alt="Autocollant 10x10">
    <h3>10 x 10</h3>
    <p>Prix : 1 €</p>
    <button class="add-to-cart" data-size="10x10" data-price="1">Ajouter au panier</button>
  </div>

  <div class="product">
    <img src="collant/20 x 20.png" alt="Autocollant 20x20">
    <h3>20 x 20</h3>
    <p>Prix : 2 €</p>
    <button class="add-to-cart" data-size="20x20" data-price="2">Ajouter au panier</button>
  </div>

  <div class="product">
    <img src="collant/30 x 30.png" alt="Autocollant 30x30">
    <h3>30 x 30</h3>
    <p>Prix : 3 €</p>
    <button class="add-to-cart" data-size="30x30" data-price="3">Ajouter au panier</button>
  </div>

</div>

<hr>

<h2>🛒 Mon panier</h2>
<div id="cart"></div>
<p><strong>Total : <span id="total">0</span> €</strong></p>

<button id="cmdcollant">Commander</button>

<footer>
  <p>&copy; 2026 LDcarp. Tous droits réservés.</p>
</footer>

<script>
let panier = [];

// Ajouter au panier
document.querySelectorAll(".add-to-cart").forEach(button => {
  button.addEventListener("click", function () {
    const size = this.dataset.size;
    const price = parseFloat(this.dataset.price);

    const produit = panier.find(item => item.size === size);

    if (produit) {
      produit.quantity++;
    } else {
      panier.push({ size, price, quantity: 1 });
    }

    afficherPanier();
  });
});

// Affichage panier
function afficherPanier() {
  const cartDiv = document.getElementById("cart");
  const totalSpan = document.getElementById("total");

  cartDiv.innerHTML = "";
  let total = 0;

  panier.forEach((item, index) => {
    total += item.price * item.quantity;

    cartDiv.innerHTML += `
      <div>
        Autocollant ${item.size} x${item.quantity}
        (${item.price * item.quantity} €)
        <button onclick="supprimer(${index})">❌</button>
      </div>
    `;
  });

  totalSpan.textContent = total.toFixed(2);
}

// Supprimer produit
function supprimer(index) {
  panier.splice(index, 1);
  afficherPanier();
}

// Commander
document.getElementById("cmdcollant").addEventListener("click", function () {

  if (panier.length === 0) {
    alert("Votre panier est vide !");
    return;
  }

  let message = "Bonjour, je souhaite commander :\n\n";
  let total = 0;

  panier.forEach(item => {
    message += `- ${item.quantity} autocollant(s) ${item.size} : ${item.price * item.quantity}€\n`;
    total += item.price * item.quantity;
  });

  message += `\nTotal : ${total}€`;

  let email = "ldcarpepro@gmail.com"; // 🔴 MET TON EMAIL ICI

  window.location.href =
    `mailto:${email}?subject=Commande Autocollants LDcarp&body=${encodeURIComponent(message)}`;
});
</script>

</body>
